<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parolni tiklash</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center py-5" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm border-0 rounded-4 p-4">
                    <div class="card-body">
                        
                        <!-- Sarlavha va icon -->
                        <div class="text-center mb-4">
                            <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-key-fill fs-3"></i>
                            </div>
                            <h2 class="fw-bold fs-4">Parolni unutdingizmi?</h2>
                            <p class="text-muted small">
                                Hisobingizga ulangan elektron pochta manzilini kiriting. Biz sizga parolni tiklash havolasini yuboramiz.
                            </p>
                        </div>

                        <!-- Forma qismi -->
                        <form method="post">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold small">Elektron pochta manzili</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" name="email" id="email" class="form-control border-start-0 ps-0 shadow-none" placeholder="name@example.com" required>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary py-2 fw-semibold rounded-3">
                                    Tiklash havolasini yuborish
                                </button>
                            </div>
                        </form>

                        <!-- Orqaga qaytish havolasi -->
                        <div class="text-center mt-4">
                            <p class="small text-muted mb-0">
                                Parolingiz esga tushdimi? 
                                <a href="{% url 'login_page' %}" class="text-decoration-none fw-semibold">Tizimga kirish</a>
                            </p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
