<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Havola muddati tugagan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: #fdecea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }
        .icon-wrapper svg { width: 40px; height: 40px; color: #d93025; }
        h1 { font-size: 24px; font-weight: 700; color: #1f1f1f; margin-bottom: 12px; }
        p { font-size: 15px; line-height: 1.6; color: #5f6368; margin-bottom: 24px; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .btn:hover { background-color: #1557b0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </div>

        <h1>Havola muddati tugagan</h1>

        <p>
            Ushbu tasdiqlash havolasi muddati tugagan yoki noto'g'ri.
        </p>

        <a href="{% url 'login_page' %}" class="btn">Bosh sahifaga</a>
    </div>
</body>
</html>
